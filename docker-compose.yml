version: "3.9"

services:
  bot:
    build: .
    container_name: tg-summarizer-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
      - /Users/macmini/SourceCode:/Users/macmini/SourceCode
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
